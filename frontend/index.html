<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetCatch - API 测试平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa}
        .login-wrap{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#667eea,#764ba2)}
        .login-box{width:400px}.login-box .el-card__body{padding:40px}
        .logo-text{text-align:center;font-size:32px;font-weight:700;color:#409eff;margin-bottom:6px}
        .login-title{text-align:center;font-size:22px;font-weight:600;color:#303133;margin-bottom:28px}
        .layout-wrap{height:100vh;display:flex;flex-direction:column}
        .topbar{display:flex;align-items:center;justify-content:space-between;height:50px;padding:0 20px;background:#fff;border-bottom:1px solid #e4e7ed;flex-shrink:0}
        .topbar .brand{font-size:18px;font-weight:700;color:#409eff}
        .body-wrap{display:flex;flex:1;overflow:hidden}
        .sidebar{width:200px;background:#304156;flex-shrink:0;overflow-y:auto}
        .sidebar .el-menu{border-right:none}
        .main-area{flex:1;padding:20px;overflow-y:auto}
        .page-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .page-hd h3{font-size:18px;font-weight:600;color:#303133}
        .mb10{margin-bottom:10px}
        .mt10{margin-top:10px}
        .mt16{margin-top:16px}
        .flex{display:flex}.flex-1{flex:1}.gap8{gap:8px}
        .ta-center{text-align:center}
        .c-gray{color:#909399}
        .kv-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
        .kv-row .k-inp{flex:0 0 180px}
        .kv-row .v-inp{flex:1}
        .mtag{font-weight:700;min-width:56px;text-align:center}
        .mtag.GET{background:#e6f7ff;color:#1890ff;border-color:#91d5ff}
        .mtag.POST{background:#f6ffed;color:#52c41a;border-color:#b7eb8f}
        .mtag.PUT{background:#fff7e6;color:#fa8c16;border-color:#ffd591}
        .mtag.DELETE{background:#fff1f0;color:#ff4d4f;border-color:#ffa39e}
        .mtag.PATCH{background:#f9f0ff;color:#722ed1;border-color:#d3adf7}
        .resp-body{background:#1e1e1e;color:#d4d4d4;padding:14px;border-radius:4px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;line-height:1.5;max-height:460px;overflow:auto;white-space:pre-wrap;word-break:break-all}
        .empty-box{text-align:center;padding:50px 0;color:#909399}
        .empty-box p{margin-top:10px}
        .el-menu-item.is-active{background-color:#409eff!important}
        .card-mb{margin-bottom:16px}
    </style>
</head>
<body>
    <div id="app"><router-view /></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>

    <script>
    // ===================== destructure =====================
    const {createApp,reactive,nextTick} = Vue;
    const {createRouter,createWebHashHistory} = VueRouter;
    const ElMsg = ElementPlus.ElMessage;
    const ElMsgBox = ElementPlus.ElMessageBox;

    // ===================== Store (global + on window for template access) =====================
    window.NC = reactive({
        token: localStorage.getItem('nc_t') || '',
        user: JSON.parse(localStorage.getItem('nc_u') || 'null'),
        project: JSON.parse(localStorage.getItem('nc_p') || 'null'),

        setToken(t){ this.token = t; localStorage.setItem('nc_t', t) },
        setUser(u){ this.user = u; localStorage.setItem('nc_u', JSON.stringify(u)) },
        setProject(p){ this.project = p; localStorage.setItem('nc_p', JSON.stringify(p)) },
        logout(){
            this.token=''; this.user=null; this.project=null;
            localStorage.removeItem('nc_t'); localStorage.removeItem('nc_u'); localStorage.removeItem('nc_p');
        }
    });

    // ===================== Axios =====================
    const http = axios.create({baseURL:'http://127.0.0.1:5000/api', timeout:60000, headers:{'Content-Type':'application/json'}});
    http.interceptors.request.use(cfg=>{
        if(window.NC.token) cfg.headers.Authorization = 'Bearer ' + window.NC.token;
        // Ensure POST/PUT/PATCH always carry Content-Type: application/json
        if(cfg.method && ['post','put','patch'].includes(cfg.method.toLowerCase())){
            if(!cfg.headers['Content-Type']) cfg.headers['Content-Type'] = 'application/json';
        }
        return cfg;
    });
    http.interceptors.response.use(
        res => res.data,
        err => {
            if(err.response && err.response.status === 401){
                window.NC.logout();
                setTimeout(()=>location.hash='#/login',100);
                ElMsg.error('登录已过期，请重新登录');
            }
            return Promise.reject(err);
        }
    );

    // ===================== Helpers =====================
    function fmtTime(t){ return t ? t.replace('T',' ').substring(0,19) : '-' }
    function fmtBody(obj){
        if(!obj) return '';
        if(typeof obj === 'string'){ try{ return JSON.stringify(JSON.parse(obj),null,2) }catch(e){ return obj } }
        try{ return JSON.stringify(obj,null,2) }catch(e){ return String(obj) }
    }
    function isHtml(str){
        return typeof str==='string' && /^\s*</.test(str.trim());
    }
    function stCodeType(c){
        if(c<200) return 'info'; if(c<300) return 'success'; if(c<400) return 'warning'; return 'danger';
    }
    function kvToObj(arr){
        const o={};
        (arr||[]).forEach(x=>{ if(x.key) o[x.key.trim()]=x.value });
        return o;
    }
    function buildCasePayload(projId,form){
        const headers = kvToObj(form.headers);
        const params = kvToObj(form.params);
        let body=null;
        if(form.body_type==='json' && form.body_text){
            try{ body=JSON.parse(form.body_text) }catch(e){ body=form.body_text }
        }else if(form.body_type==='form'){
            body = kvToObj(form.body_form);
        }else if(form.body_type==='text' && form.body_text){
            body = form.body_text;
        }
        return {
            project_id: projId,
            name: form.name || ('临时_'+Date.now()),
            method: form.method,
            url: form.url,
            headers: Object.keys(headers).length ? headers : null,
            params: Object.keys(params).length ? params : null,
            body: body,
            body_type: form.body_type==='none' ? 'json' : form.body_type,
            assertions: [],
            extract: []
        };
    }

    // ===================== KVEditor =====================
    const KVEditor = {
        props: {modelValue:{type:Array,default:()=>[]}},
        emits: ['update:modelValue'],
        template:`<div>
            <div v-for="(it,i) in local" :key="i" class="kv-row">
                <el-input v-model="it.key" placeholder="Key" size="small" class="k-inp" clearable />
                <el-input v-model="it.value" placeholder="Value" size="small" class="v-inp" clearable />
                <DataFactoryDropdown />
                <el-button size="small" type="danger" @click="del(i)" circle>×</el-button>
            </div>
            <el-button size="small" @click="add" style="margin-top:2px">+ 添加</el-button>
        </div>`,
        data(){return{local:[]}},
        watch:{
            modelValue:{immediate:true,h(v){this.local=v&&v.length?v.map(x=>({...x})):[]}},
            local:{deep:true,h(v){this.$emit('update:modelValue',v.filter(x=>x.key||x.value))}}
        },
        methods:{add(){this.local.push({key:'',value:''})},del(i){this.local.splice(i,1)}}
    };

    // ===================== DataFactoryDropdown =====================
    const DataFactoryDropdown = {
        template:`<el-dropdown trigger="click" size="small" @command="doInsert" style="margin-left:2px;display:inline-flex;vertical-align:middle">
            <el-button size="small" text type="primary" style="font-size:12px;padding:2px 6px">数据工厂 ▾</el-button>
            <template #dropdown>
                <el-dropdown-menu>
                    <el-dropdown-item command="{{$uuid}}">$uuid</el-dropdown-item>
                    <el-dropdown-item command="{{$timestamp}}">$timestamp</el-dropdown-item>
                    <el-dropdown-item command="{{$datetime}}">$datetime</el-dropdown-item>
                    <el-dropdown-item divided command="{{$random.email}}">$random.email</el-dropdown-item>
                    <el-dropdown-item command="{{$random.phone}}">$random.phone</el-dropdown-item>
                    <el-dropdown-item command="{{$random.name}}">$random.name</el-dropdown-item>
                    <el-dropdown-item command="{{$random.address}}">$random.address</el-dropdown-item>
                    <el-dropdown-item divided command="{{$random.string(8)}}">$random.string(8)</el-dropdown-item>
                    <el-dropdown-item command="{{$random.number(1,100)}}">$random.number(1,100)</el-dropdown-item>
                </el-dropdown-menu>
            </template>
        </el-dropdown>`,
        methods:{
            doInsert(val){
                const el=document.activeElement;
                if(!el||(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA'&&el.tagName!=='TEXTAREA')){
                    // try to find an input inside the closest KV row
                    const row=el?.closest?.('.kv-row');
                    const inp=row?.querySelector('.v-inp input')||row?.querySelector('.v-inp textarea')||row?.querySelector('input:not([type=hidden])');
                    if(inp){inp.focus();inp.selectionStart=inp.selectionEnd=inp.value.length;return this.doInsert(val)}
                    ElementPlus.ElMessage.warning('请先点击要插入的输入框');return
                }
                const start=el.selectionStart,end=el.selectionEnd;
                const before=el.value.substring(0,start),after=el.value.substring(end);
                el.value=before+val+after;
                el.selectionStart=el.selectionEnd=start+val.length;
                el.dispatchEvent(new Event('input',{bubbles:true}));
                el.focus();
            }
        }
    };

    // ===================== Pages =====================

    // -------- Login --------
    const LoginPage = {
        template:`<div class="login-wrap">
            <el-card class="login-box" shadow="always">
                <div class="logo-text">NetCatch</div>
                <div class="login-title">API 测试平台</div>
                <el-form @keyup.enter="login">
                    <el-form-item><el-input v-model="f.user" placeholder="用户名" size="large" clearable /></el-form-item>
                    <el-form-item><el-input v-model="f.pwd" type="password" placeholder="密码" size="large" show-password /></el-form-item>
                    <el-form-item><el-button type="primary" size="large" style="width:100%" :loading="loading" @click="login">登 录</el-button></el-form-item>
                </el-form>
                <div class="ta-center c-gray" style="font-size:13px">没有账号？<router-link to="/register" style="color:#409eff">立即注册</router-link></div>
            </el-card>
        </div>`,
        data(){return{store:window.NC,f:{user:'',pwd:''},loading:false}},
        methods:{
            async login(){
                if(!this.f.user||!this.f.pwd){ElMsg.warning('请输入用户名和密码');return}
                this.loading=true;
                try{
                    const r=await http.post('/auth/login',{username:this.f.user,password:this.f.pwd});
                    if(r.code===200){
                        this.store.setToken(r.data.token);
                        this.store.setUser(r.data.user);
                        ElMsg.success('登录成功');
                        this.$router.push('/');
                    }else{ElMsg.error(r.msg||'登录失败')}
                }catch(e){ElMsg.error(e.response?.data?.msg||'网络错误，请检查后端是否启动')
                }finally{this.loading=false}
            }
        }
    };

    // -------- Register --------
    const RegisterPage = {
        template:`<div class="login-wrap">
            <el-card class="login-box" shadow="always">
                <div class="logo-text">NetCatch</div>
                <div class="login-title">用户注册</div>
                <el-form @keyup.enter="reg">
                    <el-form-item><el-input v-model="f.user" placeholder="用户名" size="large" /></el-form-item>
                    <el-form-item><el-input v-model="f.pwd" type="password" placeholder="密码（至少6位）" size="large" show-password /></el-form-item>
                    <el-form-item><el-input v-model="f.cfm" type="password" placeholder="确认密码" size="large" show-password /></el-form-item>
                    <el-form-item><el-button type="primary" size="large" style="width:100%" :loading="loading" @click="reg">注 册</el-button></el-form-item>
                </el-form>
                <div class="ta-center c-gray" style="font-size:13px">已有账号？<router-link to="/login" style="color:#409eff">返回登录</router-link></div>
            </el-card>
        </div>`,
        data(){return{f:{user:'',pwd:'',cfm:''},loading:false}},
        methods:{
            async reg(){
                const {user,pwd,cfm}=this.f;
                if(!user||!pwd){ElMsg.warning('请填写完整信息');return}
                if(pwd.length<6){ElMsg.warning('密码不能少于6位');return}
                if(pwd!==cfm){ElMsg.warning('两次密码不一致');return}
                this.loading=true;
                try{
                    const r=await http.post('/auth/register',{username:user,password:pwd});
                    if(r.code===201){ElMsg.success('注册成功，请登录');this.$router.push('/login')}
                    else{ElMsg.error(r.msg||'注册失败')}
                }catch(e){ElMsg.error(e.response?.data?.msg||'网络错误')
                }finally{this.loading=false}
            }
        }
    };

    // -------- Main Layout --------
    const MainLayout = {
        template:`<div class="layout-wrap">
            <div class="topbar">
                <div style="display:flex;align-items:center;gap:10px">
                    <span class="brand">NetCatch</span>
                    <el-tag v-if="s.project" type="primary" effect="plain" size="small" closable @close="leaveProj">{{s.project.name}}</el-tag>
                    <el-tag v-else type="warning" size="small">未选择项目</el-tag>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:13px;color:#606266">{{s.user?.username||'用户'}}</span>
                    <el-button size="small" text @click="doLogout">退出</el-button>
                </div>
            </div>
            <div class="body-wrap">
                <div class="sidebar">
                    <el-menu :default-active="rp.path" router background-color="#304156" text-color="#bfcbd9" active-text-color="#409eff">
                        <el-menu-item index="/"><span>项目列表</span></el-menu-item>
                        <el-menu-item index="/test"><span>接口测试</span></el-menu-item>
                        <el-menu-item index="/cases"><span>用例管理</span></el-menu-item>
                        <el-menu-item index="/ai"><span>AI 生成</span></el-menu-item>
                        <el-menu-item index="/web"><span>Web 测试</span></el-menu-item>
                    </el-menu>
                </div>
                <div class="main-area"><router-view /></div>
            </div>
        </div>`,
        data(){return{s:window.NC}},
        computed:{rp(){return this.$route}},
        methods:{
            leaveProj(){this.s.setProject(null);this.$router.push('/')},
            doLogout(){this.s.logout();ElMsg.success('已退出');this.$router.push('/login')}
        }
    };

    // -------- Dashboard (Project List) --------
    const Dashboard = {
        template:`<div>
            <div class="page-hd"><h3>我的项目</h3><el-button type="primary" size="small" @click="dlg=true">+ 新建</el-button></div>
            <el-card class="card-mb">
                <template v-if="loading"><div class="empty-box"><p>加载中...</p></div></template>
                <template v-else-if="list.length===0"><div class="empty-box"><p>暂无项目，点击右上角新建</p></div></template>
                <el-table v-else :data="list" stripe @row-click="sel" style="cursor:pointer">
                    <el-table-column label="名称" prop="name" min-width="180" />
                    <el-table-column label="描述" min-width="250"><template #default="{row}">{{row.description||'-'}}</template></el-table-column>
                    <el-table-column label="创建时间" width="180"><template #default="{row}">{{fmt(row.create_time)}}</template></el-table-column>
                    <el-table-column label="操作" width="80" fixed="right">
                        <template #default="{row}"><el-button type="danger" size="small" text @click.stop="del(row)">删除</el-button></template>
                    </el-table-column>
                </el-table>
            </el-card>
            <el-dialog v-model="dlg" title="新建项目" width="420px">
                <el-form :model="fm" label-width="70px">
                    <el-form-item label="名称"><el-input v-model="fm.name" placeholder="输入项目名称" /></el-form-item>
                    <el-form-item label="描述"><el-input v-model="fm.desc" type="textarea" :rows="3" placeholder="可选" /></el-form-item>
                </el-form>
                <template #footer><el-button @click="dlg=false">取消</el-button><el-button type="primary" :loading="saving" @click="create">创建</el-button></template>
            </el-dialog>
        </div>`,
        data(){return{store:window.NC,list:[],loading:false,dlg:false,saving:false,fm:{name:'',desc:''}}},
        mounted(){this.fetch()},
        methods:{
            fmt:fmtTime,
            async fetch(){
                this.loading=true;
                try{const r=await http.get('/project');if(r.code===200)this.list=r.data||[]}catch(e){}finally{this.loading=false}
            },
            sel(p){this.store.setProject(p);ElMsg.success('已选择：'+p.name);this.$router.push('/test')},
            async create(){
                if(!this.fm.name.trim()){ElMsg.warning('请输入名称');return}
                this.saving=true;
                try{
                    const r=await http.post('/project',{name:this.fm.name.trim(),description:this.fm.desc});
                    if(r.code===201){
                        ElMsg.success('创建成功');this.dlg=false;this.fm={name:'',desc:''};
                        this.store.setProject(r.data);await this.fetch();this.$router.push('/test');
                    }
                }catch(e){ElMsg.error(e.response?.data?.msg||'创建失败')}finally{this.saving=false}
            },
            async del(p){
                try{
                    await ElMsgBox.confirm('确定删除「'+p.name+'」？数据不可恢复！','警告',{type:'warning',confirmButtonText:'删除',cancelButtonText:'取消'});
                    const r=await http.delete('/project/'+p.id);
                    if(r.code===200){
                        ElMsg.success('已删除');
                        if(this.store.project&&this.store.project.id===p.id)this.store.setProject(null);
                        await this.fetch();
                    }
                }catch(e){if(e!=='cancel')ElMsg.error(e.response?.data?.msg||'删除失败')}
            }
        }
    };

    // -------- API Test --------
    const ApiTest = {
        components:{KVEditor},
        template:`<div>
            <h3 class="page-hd" style="margin-bottom:12px">接口测试</h3>
            <template v-if="!s.project">
                <el-card><div class="empty-box"><p>请先选择项目</p><el-button type="primary" style="margin-top:10px" @click="$router.push('/')">选择项目</el-button></div></el-card>
            </template>
            <template v-else>
                <!-- Request form -->
                <el-card class="card-mb">
                    <div style="display:flex;gap:8px;margin-bottom:12px">
                        <el-select v-model="fm.method" style="width:110px">
                            <el-option v-for="m in methods" :key="m" :label="m" :value="m" />
                        </el-select>
                        <el-input v-model="fm.url" placeholder="https://api.example.com/endpoint" clearable class="flex-1" />
                    </div>
                    <el-tabs v-model="tab" type="border-card">
                        <el-tab-pane label="Params" name="p"><KVEditor v-model="fm.params" /></el-tab-pane>
                        <el-tab-pane label="Headers" name="h"><KVEditor v-model="fm.headers" /></el-tab-pane>
                        <el-tab-pane label="Body" name="b">
                            <el-radio-group v-model="fm.body_type" style="margin-bottom:10px" size="small">
                                <el-radio-button value="none">none</el-radio-button>
                                <el-radio-button value="json">JSON</el-radio-button>
                                <el-radio-button value="form">Form</el-radio-button>
                                <el-radio-button value="text">Text</el-radio-button>
                            </el-radio-group>
                            <el-input v-if="fm.body_type==='json'" v-model="fm.body_text" type="textarea" :rows="6" placeholder='{"key":"value"}' style="font-family:monospace" />
                            <div v-if="fm.body_type==='json'" style="text-align:right;margin-top:2px"><DataFactoryDropdown /></div>
                            <KVEditor v-if="fm.body_type==='form'" v-model="fm.body_form" />
                            <el-input v-if="fm.body_type==='text'" v-model="fm.body_text" type="textarea" :rows="6" />
                            <div v-if="fm.body_type==='text'" style="text-align:right;margin-top:2px"><DataFactoryDropdown /></div>
                        </el-tab-pane>
                    </el-tabs>
                    <div class="mt16 flex gap8">
                        <el-button type="primary" :loading="sending" @click="sendReq">发送请求</el-button>
                        <el-button @click="showSave=true">保存为用例</el-button>
                        <el-button @click="resetForm">重置</el-button>
                    </div>
                </el-card>

                <!-- Response -->
                <el-card v-if="resp" class="card-mb" :style="{borderLeft:'3px solid '+(resp.success?'#67c23a':'#f56c6c')}">
                    <template #header>
                        <div class="flex gap8" style="align-items:center">
                            <b>响应</b>
                            <el-tag v-if="resp.status_code" :type="st(resp.status_code)" effect="dark">{{resp.status_code}}</el-tag>
                            <span v-if="resp.response_time" class="c-gray" style="font-size:13px">{{(resp.response_time*1000).toFixed(0)}} ms</span>
                            <el-tag v-if="resp.success!==undefined" :type="resp.success?'success':'danger'" size="small">{{resp.success?'通过':'失败'}}</el-tag>
                        </div>
                        <el-alert v-if="resp.error" :title="resp.error" type="error" show-icon :closable="false" style="margin-top:6px" />
                        <el-alert v-else-if="resp.response_body && isHtml(fmt(resp.response_body))" title="响应内容为 HTML，请检查目标 URL 是否为 API 接口" type="warning" show-icon :closable="false" style="margin-top:6px" />
                    </template>
                    <el-tabs v-if="resp.response_body!==undefined||resp.response_headers">
                        <el-tab-pane label="Body"><pre class="resp-body">{{fmt(resp.response_body)}}</pre></el-tab-pane>
                        <el-tab-pane label="Headers"><pre class="resp-body">{{fmt(resp.response_headers)}}</pre></el-tab-pane>
                    </el-tabs>
                </el-card>

                <!-- Case list -->
                <el-card class="card-mb">

                    }else{ElMsg.error(r.msg||'保存失败')}

                catch(e){ElMsg.error(e.response?.data?.msg||'执行失败')}
            },
            async delOne(row){
                try{
                    await ElMsgBox.confirm('删除用例「'+row.name+'」？','确认',{type:'warning',confirmButtonText:'删除',cancelButtonText:'取消'});
                    const r=await http.delete('/case/'+row.id);if(r.code===200){ElMsg.success('已删除');await this.fetch()}
                }catch(e){if(e!=='cancel')ElMsg.error(e.response?.data?.msg||'删除失败')}
            },
            async batchRun(){
                if(this.selIds.length===0){ElMsg.warning('请选择用例');return}
                this.batRunning=true;this.batchResult=null;
                try{
                    // 1. Create suite
                    const sr=await http.post('/suite',{
                        project_id:this.store.project.id,
                        name:'批量运行_'+Date.now(),
                        case_ids:this.selIds
                    });
                    if(sr.code===201||sr.code===200){
                        const suiteId=sr.data.id;
                        // 2. Run suite
                        const rr=await http.post('/suite/'+suiteId+'/run',{});
                        if(rr.code===200){
                            const taskId=rr.data.task_id;
                            // 3. Poll for result (up to 30s)
                            let poll=0,maxPoll=30,taskData=null;
                            while(poll<maxPoll){
                                await new Promise(r=>setTimeout(r,1000));
                                const tr=await http.get('/task/'+taskId);
                                if(tr.code===200&&(tr.data.status==='success'||tr.data.status==='failed')){
                                    taskData=tr.data;
                                    break;
                                }
                                poll++;
                            }
                            if(taskData&&taskData.result){
                                const r=taskData.result;
                                this.batchResult={
                                    total:r.total||0,passed:r.passed||0,failed:r.failed||0,
                                    pass_rate:r.total?((r.passed||0)/r.total*100).toFixed(1):0,
                                    details:r.details||[]
                                };
                                ElMsg.success('批量运行完成');
                            }else{ElMsg.warning('运行超时或失败，请查看任务列表')}
                            // 4. Clean up suite
                            http.delete('/suite/'+suiteId).catch(()=>{});
                        }else{ElMsg.error(rr.msg||'执行失败')}
                    }else{ElMsg.error(sr.msg||'创建集合失败')}
                }catch(e){ElMsg.error(e.response?.data?.msg||'批量运行失败')
                }finally{this.batRunning=false}
            }
        }

                    </template>
                    <el-table :data="debugResult.steps||[]" size="small" stripe>
                        <el-table-column label="#" width="40"><template #default="{row: r}">{{r.index+1}}</template></el-table-column>
                        <el-table-column label="动作" width="120"><template #default="{row: r}">{{r.action}}</template></el-table-column>
                        <el-table-column label="结果" width="60"><template #default="{row: r}"><el-tag :type="r.success?'success':'danger'" size="small">{{r.success?'通过':'失败'}}</el-tag></template></el-table-column>
                        <el-table-column label="错误" min-width="200"><template #default="{row: r}">{{r.error||'-'}}</template></el-table-column>
                        <el-table-column label="截图" width="80"><template #default="{row: r}"><el-button v-if="r.screenshot" size="small" text type="primary" @click="viewSS(r.screenshot)">查看</el-button></template></el-table-column>
                    </el-table>
                </el-card>

                <el-dialog v-model="dlgSS" title="截图" width="60%">
                    <img v-if="ssImg" :src="'data:image/png;base64,'+ssImg" style="max-width:100%;border:1px solid #ddd" />
                </el-dialog>
            </template>
        </div>`,
        data(){
            return{
                store:window.NC,s:window.NC,actList:WEB_ACTIONS,
                scriptId:null,isNew:true,form:this.emptyForm(),
                saving:false,debugging:false,debugResult:null,dlgSS:false,ssImg:''
            }
        },
        mounted(){
            const id = this.$route.params.id;
            if(id){this.scriptId=parseInt(id);this.isNew=false;this.loadScript()}
        },
        methods:{
            emptyForm(){return{name:'',url:'',desc:'',vars:[],steps:[]}},
            resetStepFields(st){
                // Clear fields that don't apply to the new action
                const def=WEB_ACTION_MAP[st.action];
                if(!def)return;
                st.selector='';st.value='';st.expected='';st.url='';st.timeout='';st.script='';st.name='';
            },
            addStep(){this.form.steps.push(emptyStep())},
            moveStep(i,d){const a=this.form.steps;const t=a[i];a[i]=a[i+d];a[i+d]=t;this.form.steps=[...a]},
            goBack(){this.$router.push('/web')},
            async loadScript(){
                try{
                    const r=await http.get('/web/script/'+this.scriptId);
                    if(r.code===200){
                        const d=r.data;
                        this.form.name=d.name;
                        this.form.url=d.url;
                        this.form.desc=d.description||'';
                        // Variables
                        const vars=[];
                        if(d.variables&&typeof d.variables==='object')Object.entries(d.variables).forEach(([k,v])=>vars.push({key:k,value:v}));
                        this.form.vars=vars;
                        // Steps
                        this.form.steps=(d.steps||[]).map(s=>{
                            const st=emptyStep();
                            Object.assign(st,s);
                            // ensure all fields exist
                            ['selector','value','expected','url','timeout','script','name'].forEach(f=>{if(st[f]===undefined)st[f]=''});
                            return st;
                        });
                    }else{ElMsg.error(r.msg||'加载失败')}
                }catch(e){ElMsg.error('加载脚本失败')}
            },
            buildPayload(){
                const vars={};
                this.form.vars.forEach(v=>{if(v.key)vars[v.key.trim()]=v.value});
                const steps=this.form.steps.map(s=>{
                    const o={action:s.action};
                    if(s.url)o.url=s.url;
                    if(s.selector)o.selector=s.selector;
                    if(s.value)o.value=s.value;
                    if(s.expected)o.expected=s.expected;
                    if(s.timeout)o.timeout=parseInt(s.timeout);
                    if(s.script)o.script=s.script;
                    if(s.name)o.name=s.name;
                    return o;
                });
                return{
                    project_id:this.store.project.id,
                    name:this.form.name.trim(),
                    url:this.form.url.trim(),
                    description:this.form.desc.trim(),
                    steps:steps,
                    variables:Object.keys(vars).length?vars:null
                };
            },
            async save(){
                if(!this.form.name.trim()){ElMsg.warning('请输入脚本名称');return}
                if(!this.form.url.trim()){ElMsg.warning('请输入起始URL');return}
                if(this.form.steps.length===0){ElMsg.warning('至少需要一个步骤');return}
                this.saving=true;
                try{
                    const p=this.buildPayload();
                    let r;
                    if(this.isNew)r=await http.post('/web/script',p);
                    else r=await http.put('/web/script/'+this.scriptId,p);
                    if(r.code===201||r.code===200){
                        ElMsg.success('保存成功');
                        if(this.isNew){this.scriptId=r.data.id;this.isNew=false}
                    }else{ElMsg.error(r.msg||'保存失败')}
                }catch(e){ElMsg.error(e.response?.data?.msg||'保存失败')}finally{this.saving=false}
            },
            async debugRun(){
                if(this.isNew){ElMsg.warning('请先保存脚本');return}
                this.debugging=true;this.debugResult=null;
                try{
                    const r=await http.post('/web/script/'+this.scriptId+'/debug',{});
                    if(r.code===200)this.debugResult=r.data;else ElMsg.error(r.msg||'执行失败')
                }catch(e){ElMsg.error(e.response?.data?.msg||'执行失败')}finally{this.debugging=false}
            },
            viewSS(b64){this.ssImg=b64;this.dlgSS=true}
        }
    };

    // ===================== Web Test - Execution Records =====================
    const WebTasks = {
        template:`<div>
            <div class="page-hd"><h3>执行记录</h3><el-button @click="$router.push('/web')">返回</el-button></div>
            <template v-if="!s.project">
                <el-card><div class="empty-box"><p>请先选择项目</p></div></el-card>
            </template>
            <template v-else>
                <el-card class="card-mb">
                    <template v-if="loading"><div class="empty-box"><p>加载中...</p></div></template>
                    <template v-else-if="list.length===0"><div class="empty-box"><p>暂无执行记录</p></div></template>
                    <el-table v-else :data="list" stripe size="small" @row-click="viewDetail" style="cursor:pointer">
                        <el-table-column label="任务名称" prop="task_name" min-width="200" show-overflow-tooltip />
                        <el-table-column label="脚本ID" width="80"><template #default="{row: r}">{{r.script_id}}</template></el-table-column>
                        <el-table-column label="状态" width="80"><template #default="{row: r}"><el-tag :type="r.status==='success'?'success':r.status==='failed'?'danger':'warning'" size="small">{{r.status}}</el-tag></template></el-table-column>
                        <el-table-column label="开始时间" width="170"><template #default="{row: r}">{{fmt(r.start_time)}}</template></el-table-column>
                        <el-table-column label="耗时" width="80"><template #default="{row: r}">{{r.result?.total_time_ms||'-'}}ms</template></el-table-column>
                        <el-table-column label="操作" width="80" fixed="right">
                            <template #default="{row: r}"><el-button size="small" text type="primary" @click.stop="viewDetail(r)">详情</el-button></template>
                        </el-table-column>
                    </el-table>
                </el-card>

                <el-dialog v-model="dlgDetail" title="执行详情" width="80%" top="5vh">
                    <template v-if="detail">
                        <p><b>状态:</b> <el-tag :type="detail.status==='success'?'success':'danger'" size="small">{{detail.status}}</el-tag>
                        <span style="margin-left:16px"><b>耗时:</b> {{detail.result?.total_time_ms||'-'}}ms</span></p>
                        <el-table v-if="detail.result?.steps" :data="detail.result.steps" size="small" stripe style="margin-top:10px">
                            <el-table-column label="#" width="40"><template #default="{row: r}">{{r.index+1}}</template></el-table-column>
                            <el-table-column label="动作" width="120"><template #default="{row: r}">{{r.action}}</template></el-table-column>
                            <el-table-column label="结果" width="60"><template #default="{row: r}"><el-tag :type="r.success?'success':'danger'" size="small">{{r.success?'通过':'失败'}}</el-tag></template></el-table-column>
                            <el-table-column label="错误" min-width="200"><template #default="{row: r}">{{r.error||'-'}}</template></el-table-column>
                            <el-table-column label="截图" width="80"><template #default="{row: r}"><el-button v-if="r.screenshot" size="small" text type="primary" @click="viewSS(r.screenshot)">查看</el-button></template></el-table-column>
                        </el-table>
                        <pre v-if="detail.log" style="background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:4px;margin-top:10px;max-height:300px;overflow:auto;font-size:13px">{{detail.log}}</pre>
                    </template>
                    <template #footer><el-button @click="dlgDetail=false">关闭</el-button></template>
                </el-dialog>

                <el-dialog v-model="dlgSS" title="截图" width="60%">
                    <img v-if="ssImg" :src="'data:image/png;base64,'+ssImg" style="max-width:100%;border:1px solid #ddd" />
                </el-dialog>
            </template>
        </div>`,
        data(){return{store:window.NC,s:window.NC,list:[],loading:false,
            dlgDetail:false,detail:null,dlgSS:false,ssImg:''}},
        mounted(){
            const sid = this.$route.params.scriptId;
            if(sid)this.scriptIdFilter=parseInt(sid);else this.scriptIdFilter=null;
            this.fetch();
        },
        watch:{'store.project.id'(){this.fetch()}},
        methods:{
            fmt:fmtTime,
            async fetch(){
                if(!this.store.project)return;this.loading=true;
                try{
                    const params={per_page:50};
                    if(this.scriptIdFilter)params.script_id=this.scriptIdFilter;
                    const r=await http.get('/web/task',{params});
                    if(r.code===200)this.list=(r.data.items||[]).filter(Boolean);
                }catch(e){}finally{this.loading=false}
            },
            async viewDetail(r){
                try{const x=await http.get('/web/task/'+r.id);if(x.code===200)this.detail=x.data;else ElMsg.error(x.msg||'获取失败')}
                catch(e){ElMsg.error('获取详情失败')}
                this.dlgDetail=true;
            },
            viewSS(b64){this.ssImg=b64;this.dlgSS=true}
        }
    };

    // ===================== Router =====================
    const router = createRouter({
        history: createWebHashHistory(),
        routes:[
            {path:'/login',component:LoginPage,meta:{guest:true}},
            {path:'/register',component:RegisterPage,meta:{guest:true}},
            {path:'/',component:MainLayout,meta:{auth:true},children:[
                {path:'',component:Dashboard},
                {path:'test',component:ApiTest},
                {path:'cases',component:CaseManage},
                {path:'ai',component:AiGenerate},
                {path:'web',component:WebScripts},
                {path:'web/editor/:id?',component:WebEditor},
                {path:'web/tasks/:scriptId?',component:WebTasks}
            ]},
            {path:'/:pathMatch(.*)*',redirect:'/'}
        ]
    });

    router.beforeEach((to,from,next)=>{
        if(to.meta.auth && !window.NC.token) next('/login');
        else if(to.meta.guest && window.NC.token) next('/');
        else next();
    });

    // ===================== Bootstrap =====================
    const app = createApp({template:'<router-view />'});
    app.component('KVEditor', KVEditor);
    app.component('DataFactoryDropdown', DataFactoryDropdown);
    app.use(router);
    app.use(ElementPlus);
    // Register icons (safe fallback)
    try{
        if(typeof ElementPlusIconsVue !== 'undefined'){
            for(const[key,comp] of Object.entries(ElementPlusIconsVue)){app.component(key,comp)}
        }
    }catch(e){console.warn('Icon registration skipped:',e)}
    app.mount('#app');
    console.log('NetCatch Frontend v2 loaded. API: http://127.0.0.1:5000/api');
    </script>
</body>
</html>
